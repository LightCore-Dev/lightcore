<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000005;
    color: #e0e0ff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    overscroll-behavior: none;
  }

  #intro {
    position: fixed;
    inset: 0;
    background: #000005;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    overflow: hidden;
  }
  #intro.hidden { opacity: 0; visibility: hidden; }

  #intro-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: transparent;
  }

  .intro-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #viz-canvas {
    display: block;
    margin-bottom: 32px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #viz-canvas.show { opacity: 1; }

  .intro-ring {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    border: 1px solid #7c3aed33;
    box-shadow: 0 0 60px #7c3aed22, inset 0 0 60px #7c3aed11;
    animation: ringPulse 3s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .intro-ring.show { opacity: 1; }
  .intro-ring::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1px solid #22d3ee22;
    box-shadow: 0 0 40px #22d3ee11;
    animation: ringPulse 3s ease-in-out infinite reverse;
  }
  .intro-ring::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid #a78bfa11;
    animation: ringPulse 4s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.6; }
  }

  .intro-logo {
    font-family: 'Orbitron', monospace;
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 14px;
    display: flex;
    gap: 0;
    margin-bottom: 4px;
    position: relative;
  }
  .intro-letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(30px) scaleY(0.4);
    transition: opacity 0.45s ease, transform 0.45s ease, text-shadow 0.45s ease;
    text-shadow: none;
  }
  .intro-letter.show {
    opacity: 1;
    transform: translateY(0) scaleY(1);
    text-shadow: 0 0 20px #a78bfa, 0 0 60px #7c3aed88;
  }
  .intro-letter.glow {
    text-shadow: 0 0 10px #fff, 0 0 30px #c4b5fd, 0 0 80px #a78bfa, 0 0 140px #7c3aed;
    animation: letterPulse 2s ease-in-out infinite;
  }
  @keyframes letterPulse {
    0%,100% { text-shadow: 0 0 12px #fff, 0 0 30px #c4b5fd, 0 0 80px #a78bfa, 0 0 140px #7c3aed; }
    50%      { text-shadow: 0 0 20px #fff, 0 0 50px #c4b5fd, 0 0 120px #a78bfa, 0 0 200px #7c3aed; }
  }

  .intro-sub {
    font-size: 13px;
    color: #22d3ee;
    margin-top: 8px;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0;
    font-weight: 600;
    transition: opacity 0.4s ease;
    min-height: 20px;
  }
  .intro-sub.show { opacity: 1; }
  .intro-sub .cursor {
    display: inline-block;
    width: 2px; height: 13px;
    background: #22d3ee;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .intro-tagline {
    margin-top: 20px;
    font-size: 11px;
    color: #7c6faf;
    letter-spacing: 3px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .intro-tagline.show { opacity: 1; }

  .intro-btn {
    margin-top: 48px;
    padding: 18px 64px;
    background: transparent;
    border: 1px solid #7c3aed66;
    color: #c4b5fd;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.4s ease;
    opacity: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 30px #7c3aed22, inset 0 0 30px #7c3aed08;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  .intro-btn.show { opacity: 1; transition-delay: 0s; }
  .intro-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, #a78bfa22, transparent);
    transition: left 0.6s ease;
  }
  .intro-btn:hover::before { left: 100%; }
  .intro-btn:hover {
    background: linear-gradient(135deg, #7c3aed22, #22d3ee11);
    border-color: #c4b5fd;
    box-shadow: 0 0 80px #7c3aedaa, 0 0 150px #7c3aed33, inset 0 0 40px #7c3aed22;
    color: #fff;
    letter-spacing: 9px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  #intro-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 99999;
    transition: opacity 0.15s ease;
  }
  #intro-flash.flash { opacity: 0.15; }

  .intro-warning {
    margin-top: 36px;
    max-width: 360px;
    position: relative;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px 16px;
    border: 1px solid #ffffff14;
    background: #ffffff06;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .intro-warning.show { opacity: 1; transform: translateY(0); }
  .intro-warning .warn-corner {
    position: absolute;
    width: 8px; height: 8px;
    color: #ffffff22;
  }
  .intro-warning .warn-corner--tl { top: 4px; left: 4px; border-top: 1px solid currentColor; border-left: 1px solid currentColor; }
  .intro-warning .warn-corner--br { bottom: 4px; right: 4px; border-bottom: 1px solid currentColor; border-right: 1px solid currentColor; }
  .intro-warning-icon {
    font-size: 13px;
    color: #f59e0b99;
    line-height: 1.4;
  }
  .intro-warning-text {
    font-size: 11px;
    line-height: 1.5;
    color: #6b7280;
    letter-spacing: 0.3px;
  }
  .intro-warning-soul {
    color: #a78bfa99;
    font-weight: 600;
  }

  @media (max-width: 480px) {
    .intro-logo { font-size: 36px; }
  }

  @media (prefers-reduced-motion: reduce) {
    #intro-canvas { display: none; }
  }

  body.lcx-safe-mode #intro-canvas { display: none; }
  body.lcx-safe-mode .intro-letter,
  body.lcx-safe-mode .intro-letter.glow {
    animation: none !important;
  }
</style>
</head>
<body>

<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div class="intro-inner">
    <div class="intro-ring" id="introRing"></div>
    <canvas id="viz-canvas" width="420" height="80"></canvas>

    <div class="intro-logo" id="introLogo"></div>
    <div class="intro-sub" id="introSub"><span class="cursor"></span></div>
    <div class="intro-tagline" id="introTagline">
      Beats &nbsp;·&nbsp; Collabs &nbsp;·&nbsp; Licenses
    </div>
    <button class="intro-btn" id="introBtn" onclick="enterStore()">
      Enter The Store
    </button>

    <div class="intro-warning" id="introWarning">
      <span class="warn-corner warn-corner--tl"></span>
      <span class="warn-corner warn-corner--br"></span>
      <div class="intro-warning-icon">⚠</div>
      <div class="intro-warning-text">
        <span class="intro-warning-soul">Soul says:</span>
        animations are a work in progress &amp; will be reworked —
        rendering varies by browser. Chrome gives the smoothest experience.
      </div>
    </div>
  </div>
</div>

<div id="intro-flash"></div>

<script>
  // Respect the "Disable Effects" choice from the warning screen
  let lcSafeMode = false;
  try { lcSafeMode = localStorage.getItem('lcx_safe') === '1'; } catch (e) {}
  if (lcSafeMode) document.body.classList.add('lcx-safe-mode');

  function enterStore() {
    try { localStorage.setItem('lc_seen_intro', '1'); } catch (e) {}
    const flash = document.getElementById('intro-flash');
    flash.classList.add('flash');
    document.getElementById('intro').classList.add('hidden');
    setTimeout(() => {
      window.location.href = 'choose.html';
    }, 280);
  }

  // ── INTRO CANVAS — HYPERSPACE WARP TUNNEL ────────────────────────
  (function() {
    if (lcSafeMode) return; // skip the flashing canvas entirely in safe mode
    const canvas = document.getElementById('intro-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    const STAR_COUNT = 220;
    const stars = [];
    function mkStar() {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 0.4 + 0.02;
      return {
        angle,
        dist,
        speed: Math.random() * 0.0012 + 0.0004,
        size: Math.random() * 1.4 + 0.3,
        col: ['167,139,250','34,211,238','244,114,182','255,255,255'][Math.floor(Math.random()*4)],
        trail: 0,
      };
    }
    for (let i = 0; i < STAR_COUNT; i++) stars.push(mkStar());

    const pts = [];
    for (let i = 0; i < 50; i++) pts.push({
      x: Math.random() * 1920, y: Math.random() * 1080 + 600,
      vx: (Math.random() - 0.5) * 0.5, vy: -(0.3 + Math.random() * 0.9),
      size: Math.random() * 2 + 0.5,
      col: ['167,139,250','34,211,238','244,114,182'][Math.floor(Math.random()*3)],
      alpha: 0
    });

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.016;
      const cx = W / 2, cy = H / 2;

      for (let r = 0; r < 5; r++) {
        const phase = (t * 0.6 + r * 0.2) % 1;
        const radius = phase * Math.min(W, H) * 0.7;
        const alpha = (1 - phase) * 0.07;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(124,58,237,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      stars.forEach(s => {
        s.dist += s.speed * (1 + s.dist * 2);
        s.trail += s.speed * 60;
        if (s.dist > 0.85) { Object.assign(s, mkStar(), { dist: Math.random() * 0.03, trail: 0 }); return; }

        const x = cx + Math.cos(s.angle) * s.dist * W * 0.6;
        const y = cy + Math.sin(s.angle) * s.dist * H * 0.6;
        const tx = cx + Math.cos(s.angle) * (s.dist - s.speed * 8) * W * 0.6;
        const ty = cy + Math.sin(s.angle) * (s.dist - s.speed * 8) * H * 0.6;

        const alpha = Math.min(s.dist * 2.5, 0.85);
        const grad = ctx.createLinearGradient(tx, ty, x, y);
        grad.addColorStop(0, `rgba(${s.col},0)`);
        grad.addColorStop(1, `rgba(${s.col},${alpha})`);
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(x, y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = s.size * (0.5 + s.dist * 1.5);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, s.size * (0.8 + s.dist), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.col},${alpha * 0.9})`;
        ctx.fill();
      });

      const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
      vg.addColorStop(0, 'rgba(124,58,237,0.18)');
      vg.addColorStop(0.4, 'rgba(34,211,238,0.05)');
      vg.addColorStop(1, 'transparent');
      ctx.fillStyle = vg;
      ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI * 2); ctx.fill();

      const sy = ((t * 65) % (H + 200)) - 100;
      const sg = ctx.createLinearGradient(0, sy - 80, 0, sy + 80);
      sg.addColorStop(0, 'transparent'); sg.addColorStop(0.5, 'rgba(167,139,250,0.04)'); sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg; ctx.fillRect(0, sy - 80, W, 160);

      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.alpha = Math.min(p.alpha + 0.005, 0.5);
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; p.alpha = 0; }
        ctx.beginPath(); ctx.arc(p.x % W, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.col},${p.alpha})`;
        ctx.fill();
      });
    }
    let rafId, lastFrame = 0;
    const INTERVAL = 1000 / 30;
    function loop(now) {
      rafId = requestAnimationFrame(loop);
      if (now - lastFrame < INTERVAL) return;
      lastFrame = now;
      draw();
    }
    loop(0);
  })();

  // ── LETTER-BY-LETTER LOGO REVEAL ─────────────────────────────────
  function revealLogo() {
    const el = document.getElementById('introLogo');
    const text = 'LIGHTCORE';
    const chars = '!@#$%^&*<>?/|\\~';
    el.innerHTML = '';
    const spans = text.split('').map(ch => {
      const s = document.createElement('span');
      s.className = 'intro-letter'; s.textContent = ch; el.appendChild(s); return s;
    });
    spans.forEach((s, i) => {
      setTimeout(() => {
        let n = 0;
        const iv = setInterval(() => {
          s.textContent = chars[Math.floor(Math.random()*chars.length)];
          s.style.color = ['#a78bfa','#22d3ee','#f472b6','#fff'][Math.floor(Math.random()*4)];
          if (++n >= 5) {
            clearInterval(iv); s.textContent = text[i]; s.style.color = '';
            s.classList.add('show');
            if (i === spans.length-1) setTimeout(() => spans.forEach(sp => sp.classList.add('glow')), 300);
          }
        }, 55);
      }, 900 + i * 95);
    });
  }

  // ── TYPING TEXT ───────────────────────────────────────────────────
  function typeText(el, text) {
    el.classList.add('show');
    const cursor = el.querySelector('.cursor');
    let i = 0;
    const iv = setInterval(() => {
      cursor.insertAdjacentText('beforebegin', text[i++]);
      if (i >= text.length) clearInterval(iv);
    }, 55);
  }

  window.onload = () => {
    document.getElementById('introRing').classList.add('show');

    // Step 1: Visualizer builds up (300ms)
    setTimeout(() => {
      const vc = document.getElementById('viz-canvas');
      vc.classList.add('show');
      const ctx = vc.getContext('2d');
      const W = vc.width, H = vc.height;
      const BAR_COUNT = 42;
      const GAP = 3;
      const barW = (W - GAP * (BAR_COUNT - 1)) / BAR_COUNT;

      const targets = Array.from({length: BAR_COUNT}, (_, i) => {
        const center = Math.abs(i - BAR_COUNT / 2) / (BAR_COUNT / 2);
        const base = (1 - center * 0.5) * 0.6;
        return (base + Math.random() * 0.4) * H;
      });

      const curr = new Array(BAR_COUNT).fill(0);
      const phases = Array.from({length: BAR_COUNT}, () => Math.random() * Math.PI * 2);
      let startT = null;

      function drawViz(ts) {
        if (!startT) startT = ts;
        const elapsed = ts - startT;
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < BAR_COUNT; i++) {
          const delay = i * 18;
          if (elapsed > delay) {
            const progress = Math.min((elapsed - delay) / 600, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            curr[i] = targets[i] * eased;
          }

          const bob = elapsed > 800 ? Math.sin(elapsed * 0.003 + phases[i]) * 6 : 0;
          const h = Math.max(curr[i] + bob, 2);
          const x = i * (barW + GAP);
          const y = H - h;

          const t = i / BAR_COUNT;
          let r, g, b;
          if (t < 0.5) {
            r = Math.round(167 + (34 - 167) * (t * 2));
            g = Math.round(139 + (211 - 139) * (t * 2));
            b = Math.round(250 + (238 - 250) * (t * 2));
          } else {
            r = Math.round(34 + (244 - 34) * ((t - 0.5) * 2));
            g = Math.round(211 + (114 - 211) * ((t - 0.5) * 2));
            b = Math.round(238 + (182 - 238) * ((t - 0.5) * 2));
          }
          const alpha = 0.85;

          ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.fillRect(x, y, barW, h);

          const grad = ctx.createLinearGradient(0, H, 0, H + h * 0.4);
          grad.addColorStop(0, `rgba(${r},${g},${b},0.18)`);
          grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
          ctx.fillStyle = grad;
          ctx.fillRect(x, H, barW, h * 0.4);
        }

        requestAnimationFrame(drawViz);
      }
      requestAnimationFrame(drawViz);
    }, 300);

    // Step 2: Logo glitch reveal (700ms)
    setTimeout(revealLogo, 700);
    // Step 3: Typing subtitle (2300ms)
    setTimeout(() => typeText(document.getElementById('introSub'), 'Official Beat Store'), 2300);
    // Step 4: Tagline (3300ms)
    setTimeout(() => document.getElementById('introTagline').classList.add('show'), 3300);
    // Step 5: Enter button + warning (3900ms / 4200ms)
    setTimeout(() => {
      document.getElementById('introBtn').classList.add('show');
      setTimeout(() => document.getElementById('introWarning').classList.add('show'), 300);
    }, 3900);
  };
</script>

</body>
</html>
